name: Run Python Script

on: push

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run script
        run: |
              python Assignment-1.py
              python Assignment-2.py
              python Assignment-3.py
        
